<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="indexTitle">塔罗牌快速学习</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="lang-switch">
        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()" data-i18n="langBtn">🌐 English</button>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="title" data-i18n="indexTitle">🎴 塔罗牌快速学习</h1>
            <p class="subtitle" data-i18n="indexSubtitle">三天掌握塔罗牌基础解读技巧</p>
        </header>

        <main class="main-content">
            <div class="days-grid">
                <a href="day1.html" class="day-card day-1">
                    <div class="day-number" data-i18n="day1Number">第一天</div>
                    <div class="day-title" data-i18n="day1Title">记大牌</div>
                    <div class="day-desc" data-i18n="day1Desc">学习22张大阿卡纳<br>画面特征+关键词</div>
                    <div class="day-icon">📚</div>
                </a>

                <a href="day2.html" class="day-card day-2">
                    <div class="day-number" data-i18n="day2Number">第二天</div>
                    <div class="day-title" data-i18n="day2Title">看图说话</div>
                    <div class="day-desc" data-i18n="day2Desc">随机抽牌练习<br>培养直觉连接</div>
                    <div class="day-icon">🃏</div>
                </a>

                <a href="day3.html" class="day-card day-3">
                    <div class="day-number" data-i18n="day3Number">第三天</div>
                    <div class="day-title" data-i18n="day3Title">实战解牌</div>
                    <div class="day-desc" data-i18n="day3Desc">四角度解读法<br>案例学习</div>
                    <div class="day-icon">🎯</div>
                </a>
            </div>

            <div class="tips-section">
                <h2 class="tips-title" data-i18n="tipsTitle">💡 学习建议</h2>
                <ul class="tips-list">
                    <li data-i18n="tip1">每天坚持15-30分钟即可</li>
                    <li data-i18n="tip2">第一天先记忆，不要着急解牌</li>
                    <li data-i18n="tip3">第二天培养直觉，大胆联想</li>
                    <li data-i18n="tip4">第三天练习用四步法解牌</li>
                    <li data-i18n="tip5">持续练习，积少成多</li>
                </ul>
            </div>
        </main>

        <footer class="footer">
            <p data-i18n="footerText">🌟 学习塔罗，认识自己</p>
        </footer>
    </div>

    <script src="translation.js"></script>
</body>
</html>
